name: presupuesto_flutter
description: A modern bi-monthly personal budget application.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  flutter_riverpod: ^2.5.1
  
  # Local storage
  shared_preferences: ^2.2.3

  # Fonts and Styling
  google_fonts: ^6.2.1
  
  # Icons
  font_awesome_flutter: ^10.7.0

  # Charts (optional for dashboard if needed, using standard UI for now)
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
